services:

  db:
    image: postgres:15
    container_name: routerrank-db
    environment:
      POSTGRES_DB:       routerrank_test
      POSTGRES_USER:     postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5434:5432"
    volumes:
      - ./docker/init.sql:/docker-entrypoint-initdb.d/init.sql
      - routerrank_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  postgrest:
    image: postgrest/postgrest:v12.0.2
    container_name: routerrank-postgrest
    environment:
      PGRST_DB_URI:       postgres://postgres:postgres@db:5432/routerrank_test
      PGRST_DB_SCHEMA:    public
      PGRST_DB_ANON_ROLE: anon
      PGRST_JWT_SECRET:   super-secret-jwt-token-with-at-least-32-characters-long
    # 不对外暴露端口，只在内部网络供 nginx 访问
    depends_on:
      db:
        condition: service_healthy

  # API 网关：把 /rest/v1/* 路由到 PostgREST（模拟 Supabase 云端的 Kong）
  gateway:
    image: nginx:alpine
    container_name: routerrank-gateway
    volumes:
      - ./docker/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "54321:54321"
    depends_on:
      - postgrest

volumes:
  routerrank_db_data:
