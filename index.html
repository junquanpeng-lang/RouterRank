        t = window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark';

      document.documentElement.dataset.theme = t;
    } catch (e) {
      document.documentElement.dataset.theme = 'dark';

  })();

function computeL1(s) {
  return Math.round(s.L1.modelAuth * 0.5 + s.L1.billingTrans * 0.3 + s.L1.cacheFraud * 0.2);

function computeL2(s) {
  return Math.round(s.L2.latency * 0.5 + s.L2.throughput * 0.3 + s.L2.longContext * 0.2);

function computeOverall(p) {
  return Math.round(computeL1(p.scores) * 0.4 + computeL3(p.scores) * 0.4 + computeL2(p.scores) * 0.2);

  if (overall >= 90) return 'AAA';
  if (overall >= 80) return 'AA';
  if (overall >= 70) return 'A';
  if (overall >= 60) return 'B';
  return 'C';

// One-line evidence note per L group on the Provider detail score breakdown.

  if (group === 'L1') {

                     p.type === 'gateway' ? '1.0× baseline (passthrough gateway)' :

    return `${fmtUSD(p.cost)} blended · ${p.costDelta > 0 ? '+' : ''}${p.costDelta}% vs ref · ${baseline}`;
  }
  return '';
}

function tokenCost(p, inTok, outTok) {

// Spec §7.5 — stepped bands

  if (s < 1) return 100;

}

// Spec §7.2 — linear interpolation between anchor points on price_ratio
function costScore(observed, ref) {
  if (!ref || ref <= 0) return 50;
  const r = observed / ref;
  const anchors = [[0.8, 100], [1.0, 85], [1.2, 70], [1.5, 40], [2.0, 10]];
  if (r <= anchors[0][0]) return anchors[0][1];
  if (r >= anchors[anchors.length - 1][0]) return anchors[anchors.length - 1][1];
  for (let i = 0; i < anchors.length - 1; i++) {
    const [r0, s0] = anchors[i], [r1, s1] = anchors[i + 1];
    if (r >= r0 && r <= r1) return Math.round(s0 + (s1 - s0) * (r - r0) / (r1 - r0));
  }
  return 50;
}

function detectBenchmark(prompt) {

  if (/(box|labels?\s+are\s+wrong|riddle)/.test(p) && /(apple|orange|fruit)/.test(p)) return 'reasoning';
  if (/\b(implement|debounce|throttle|jsdoc|typescript|interface|function signature)\b/.test(p)) return 'coding';

  if (/coworker|confidential|safely|ethical|policy violation/.test(p)) return 'safety';

  if (/legal document|summarize.*page|long context|attached document/.test(p)) return 'long';
  return 'default';
}

function strHash(s) {
  let h = 5381;
  for (let i = 0; i < s.length; i++) h = ((h << 5) + h) ^ s.charCodeAt(i);
  return Math.abs(h);
}

function getMockResponse(prompt, slug) {
  const bench = detectBenchmark(prompt);
  const pool = BENCHMARK_RESPONSES[bench] || BENCHMARK_RESPONSES.default;
  const idx = strHash(slug + bench) % pool.length;
  let resp = pool[idx];
  const style = PROVIDER_STYLE[slug] || { verbosity: 1, postscript: '' };
  if (style.verbosity < 0.7) {
    const paras = resp.split(/\n\n+/);
    resp = paras.slice(0, Math.max(1, Math.ceil(paras.length * 0.55))).join('\n\n');
  } else if (style.verbosity > 1.05 && style.postscript) {
    resp = resp + style.postscript;
  }
  return resp;
}

// Stable per-(prompt, slug) score in [base, base+span)
function seededScore(prompt, slug, salt, base, span) {
  return base + (strHash((prompt || '') + slug + salt) % span);
}

// Provider mounts only certain model families honestly. Pure inference
// providers (Together / Fireworks / Anyscale / Replicate) do not serve
// closed-source models — surfacing this is part of the truth.
function fingerprint(slug, modelId) {
  const p = PROVIDERS.find(x => x.slug === slug);
  const m = MODELS.find(x => x.id === modelId);
  if (!p || !m) return null;

  const closed = ['OpenAI', 'Anthropic', 'Google'].includes(m.owner);
  const isPureInference = p.type === 'inference';
  if (closed && isPureInference) {
    return {
      unsupported: true,
      reason: `${p.name} is a direct-inference provider for open-weight models. Requests for ${m.owner} models would not be routed honestly.`,
    };
  }

  const key = `${slug}:${modelId}`;
  const ov = FINGERPRINT_OVERRIDES[key] || {};
  const seed = strHash(key);

  const base = p.trust / 100;
  const noise = ((seed % 200) - 100) / 4000;
  const embedDist = ov.embedDist != null ? ov.embedDist
                   : Math.min(0.99, Math.max(0.45, base + noise + 0.02));

  const lengthKsP = ov.lengthKsP != null ? ov.lengthKsP
                   : Math.min(0.95, Math.max(0.04, 0.40 + (p.trust - 80) / 120 + ((seed % 100) - 50) / 600));

  const tokExpected = m.owner === 'OpenAI' ? 'cl100k_base'
                     : m.owner === 'Anthropic' ? 'claude'
                     : m.owner === 'Google' ? 'gemini'
                     : 'sentencepiece';
  const tokenizer = ov.tokenizer
    ? { observed: ov.tokenizer.observed, expected: ov.tokenizer.expected || tokExpected, match: ov.tokenizer.observed === (ov.tokenizer.expected || tokExpected) }
    : { observed: tokExpected, expected: tokExpected, match: true };

  const precision = ov.precision || (p.trust >= 85 ? 'FP16' : 'FP16');

  const refusalDelta = ov.refusalDelta != null ? ov.refusalDelta
                      : Math.round(((seed % 14) - 7) * (1 - p.trust / 110));

  const samples = Math.max(48, Math.round(p.samples / (MODELS.length * 2) + (seed % 80)));

  // Composite match score (0-100) — mirrors the visible bars below
  const score = Math.round(
    Math.max(0, embedDist * 50) +
    lengthKsP * 20 +
    (tokenizer.match ? 15 : 4) +
    (precision === 'FP16' ? 10 : precision === 'Q8' ? 6 : 3) +
    Math.max(0, 5 - Math.abs(refusalDelta) * 0.5)
  );

  return {
    embedDist, lengthKsP, tokenizer, precision, refusalDelta,
    samples, score,
    flag: ov.flag || null,
  };
}

// Try to recognize a known PROVIDER from a pasted URL, e.g. https://api.together.ai/v1
function inferProvider(rawUrl) {
  if (!rawUrl) return null;
  let host = '';
  try {
    const u = new URL(rawUrl.match(/^https?:/) ? rawUrl : 'https://' + rawUrl);
    host = u.hostname.toLowerCase();
  } catch { return null; }
  const stripped = host.replace(/^(api|www|inference|router|gateway)\./, '');
  for (const p of PROVIDERS) {
    if (!p.domain) continue;
    if (host === p.domain || host.endsWith('.' + p.domain) || stripped === p.domain) return p.slug;
  }
  return null;
}

// Deterministic fingerprint for any URL we haven't sampled before. Lower
// confidence than `fingerprint()` because it's a single-shot probe, not
// a continuous panel.
function syntheticFingerprint(url, modelId) {
  const m = MODELS.find(x => x.id === modelId);
  if (!m) return null;
  const seed = strHash(url + ':' + modelId);
  // First-seen endpoints get a moderate baseline. Hash drives the spread.
  const baseTier = 60 + (seed % 30); // 60..89
  const embedDist = Math.min(0.97, Math.max(0.55, (baseTier / 100) + ((seed % 200) - 100) / 5000));
  const lengthKsP = Math.min(0.92, Math.max(0.05, 0.30 + (baseTier - 70) / 150 + ((seed % 100) - 50) / 700));

  const tokExpected = m.owner === 'OpenAI' ? 'cl100k_base'
                     : m.owner === 'Anthropic' ? 'claude'
                     : m.owner === 'Google' ? 'gemini'
                     : 'sentencepiece';
  // Random-ish chance of tokenizer mismatch for unknown URLs (signals fallback risk)
  const tokMatch = (seed % 100) > 12;
  const tokenizer = {
    observed: tokMatch ? tokExpected : 'cl100k_base',
    expected: tokExpected,
    match: tokMatch,
  };
  const precision = (seed % 100) > 30 ? 'FP16' : (seed % 100) > 8 ? 'Q8' : 'Q4';
  const refusalDelta = Math.round(((seed % 18) - 9) * 0.7);
  const samples = 40 + (seed % 30); // single-probe; small sample
  const score = Math.round(
    Math.max(0, embedDist * 50) +
    lengthKsP * 20 +
    (tokenizer.match ? 15 : 4) +
    (precision === 'FP16' ? 10 : precision === 'Q8' ? 6 : 3) +
    Math.max(0, 5 - Math.abs(refusalDelta) * 0.5)
  );
  let flag = null;
  if (!tokenizer.match) flag = { kind: 'tokenizer_mismatch', headline: 'Tokenizer mismatch', detail: `Observed tokenizer (${tokenizer.observed}) does not match the expected ${tokenizer.expected} signature for ${m.display}. This is a strong signal of silent fallback or a non-canonical variant.` };
  else if (precision === 'Q4') flag = { kind: 'quantization', headline: 'Aggressive quantization (Q4)', detail: 'Q4 weights detected via numeric task accuracy delta. Cost is lower; reasoning benchmarks underperform by ~9 points vs FP16.' };
  else if (precision === 'Q8') flag = { kind: 'quantization', headline: 'Quantization detected (Q8)', detail: '~6% accuracy delta on numeric tasks vs canonical FP16 baseline.' };
  return {
    firstSeen: true,
    embedDist, lengthKsP, tokenizer, precision, refusalDelta,
    samples, score, flag,
  };
}

function trustHistory(p) {

  const startVal = p.trust - drift;
  for (let i = 0; i < 30; i++) {
    const linear = startVal + (drift * i / 29);
    const noise = (((seed * (i + 7)) % 100) - 50) / 50; // ±1
    // bai gets a dip & recover story
    let bump = 0;
    if (p.slug === 'bai' && i >= 6 && i <= 12) bump = -3 + (i - 9);
    spark.push(Math.round(linear + noise + bump));
  }

  const mediums = (p.incidents || []).filter(i => i.sev === 'medium' || i.sev === 'high');
  const parseAgoH = s => {
    const m = /(\d+)\s*([hd])/.exec(s || '');
    return m ? Number(m[1]) * (m[2] === 'd' ? 24 : 1) : Infinity;
  };
  const oldestMediumH = mediums.length ? Math.min(...mediums.map(i => parseAgoH(i.time))) : null;
  const streakDays = oldestMediumH == null ? 30 + (seed % 14) : Math.max(0, Math.floor(oldestMediumH / 24));

  const recoveryMin = (p.incidents || []).length === 0 ? null : 4 + (seed % 28);

  const delta30 = spark[spark.length - 1] - spark[0];
  const trend = delta30 >= 2 ? 'up' : delta30 <= -2 ? 'down' : 'flat';

  return { spark, streakDays, recoveryMin, delta30, trend };
}

const RouterCtx = createContext(null);

function useRouter() {
  return useContext(RouterCtx);
}

function parseHashStr(s) {
  const h = (s || '').replace(/^#/, '') || '/';
  const [path, qs = ''] = h.split('?');
  const params = Object.fromEntries(new URLSearchParams(qs));
  return { path, params };
}

function RouterProvider({ children }) {
  const [route, setRoute] = useState(() => parseHashStr(window.location.hash));

  useEffect(() => {
    const onHash = () => setRoute(parseHashStr(window.location.hash));
    window.addEventListener('hashchange', onHash);
    window.addEventListener('popstate', onHash);

    // Click delegation — robust against sandboxed iframes that swallow
    // the hashchange event when href="#/..." anchors fire.
    const onClick = (e) => {
      if (e.defaultPrevented) return;
      if (e.metaKey || e.ctrlKey || e.shiftKey || e.altKey || e.button !== 0) return;
      const a = e.target.closest && e.target.closest('a[href]');
      if (!a) return;
      const href = a.getAttribute('href');
      if (!href || (!href.startsWith('#/') && href !== '#')) return;
      if (a.target && a.target !== '' && a.target !== '_self') return;
      e.preventDefault();
      const next = href === '#' ? '#/' : href;
      if (window.location.hash !== next) {
        try { history.pushState(null, '', next); }
        catch { window.location.hash = next.slice(1); }
      }
      setRoute(parseHashStr(next));
    };
    document.addEventListener('click', onClick);

    return () => {
      window.removeEventListener('hashchange', onHash);
      window.removeEventListener('popstate', onHash);
      document.removeEventListener('click', onClick);
    };
  }, []);

  const navigate = (path, params = {}) => {
    const qs = new URLSearchParams(params).toString();
    const target = qs ? `#${path}?${qs}` : `#${path}`;
    if (window.location.hash !== target) {
      try { history.pushState(null, '', target); }
      catch { window.location.hash = target.slice(1); }
    }
    setRoute(parseHashStr(target));
  };

  return <RouterCtx.Provider value={{ route, navigate }}>{children}</RouterCtx.Provider>;
}

function ToastProvider({ children }) {
  const [msg, setMsg] = useState('');

          {msg}
        </div>
      )}
    </ToastCtx.Provider>
  );
}

const LangCtx = createContext(null);
const useLang = () => useContext(LangCtx);

function LangProvider({ children }) {
  const [lang, setLang] = useState(() => {
    try {
      const saved = localStorage.getItem('rr-lang');
      if (saved === 'en' || saved === 'zh') return saved;
    } catch {}
    if (typeof navigator !== 'undefined' && /^zh/i.test(navigator.language || '')) return 'zh';
    return 'en';
  });
  useEffect(() => {
    document.documentElement.lang = lang === 'zh' ? 'zh-CN' : 'en';
    try { localStorage.setItem('rr-lang', lang); } catch {}
  }, [lang]);

  const t = (path, vars) => {
    const walk = (root) => path.split('.').reduce((o, k) => (o && o[k] != null ? o[k] : undefined), root);
    let val = walk(I18N[lang]);
    if (val === undefined && lang !== 'en') val = walk(I18N.en);
    if (val === undefined) return path;
    if (typeof val === 'string' && vars) {
      Object.keys(vars).forEach(k => {
        val = val.replace(new RegExp('\\{' + k + '\\}', 'g'), vars[k]);
      });
    }
    return val;
  };

  const toggle = () => setLang(l => (l === 'zh' ? 'en' : 'zh'));
  return <LangCtx.Provider value={{ lang, setLang, toggle, t }}>{children}</LangCtx.Provider>;
}

const ThemeCtx = createContext(null);
const useTheme = () => useContext(ThemeCtx);

function ThemeProvider({ children }) {
  const [theme, setTheme] = useState(() => {
    if (typeof document !== 'undefined' && document.documentElement.dataset.theme) {
      return document.documentElement.dataset.theme;
    }
    if (typeof localStorage !== 'undefined') {
      const saved = localStorage.getItem('rr-theme');
      if (saved === 'light' || saved === 'dark') return saved;
    }
    if (typeof window !== 'undefined' && window.matchMedia) {
      return window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark';
    }
    return 'dark';
  });
  useEffect(() => {
    document.documentElement.dataset.theme = theme;
    try { localStorage.setItem('rr-theme', theme); } catch {}
  }, [theme]);
  const toggle = () => {
    // Suspend transitions for one paint so border / bg flips at the same
    // instant — avoids the faint border "fading through invisible" during
    // the 150ms transition-colors window when bg snaps and border eases.
    document.documentElement.classList.add('theme-switching');
    setTheme(t => (t === 'light' ? 'dark' : 'light'));
    requestAnimationFrame(() => {
      requestAnimationFrame(() => {
        document.documentElement.classList.remove('theme-switching');
      });
    });
  };
  return <ThemeCtx.Provider value={{ theme, toggle }}>{children}</ThemeCtx.Provider>;
}

function useStreamingText(text, tokenMs = 18) {
  const [shown, setShown] = useState('');
  const [done, setDone] = useState(false);

  useEffect(() => {
    if (!text) { setShown(''); setDone(false); return; }
    setShown('');
    setDone(false);
    const tokens = text.match(/\S+\s*|\s+/g) || [];
    let i = 0;
    const id = setInterval(() => {
      const step = 1 + Math.floor(Math.random() * 3);
      i = Math.min(i + step, tokens.length);
      setShown(tokens.slice(0, i).join(''));
      if (i >= tokens.length) { clearInterval(id); setDone(true); }
    }, tokenMs);
    return () => clearInterval(id);
  }, [text, tokenMs]);

  return { shown, done };
}

async function copyToClipboard(text) {
  try {
    await navigator.clipboard.writeText(text);
    return true;
  } catch {
    const el = document.createElement('textarea');
    el.value = text;
    document.body.appendChild(el);
    el.select();
    try { document.execCommand('copy'); } catch {}
    document.body.removeChild(el);
    return true;
  }
}

// Display label for an external website URL. GitHub hosts get path-aware
// labels (github.com/BerriAI/litellm); commercial domains drop the www.
function websiteLabel(website) {
  if (!website) return null;
  try {
    const u = new URL(website);
    if (u.hostname === 'github.com') return 'github.com' + u.pathname.replace(/\/$/, '');
    return u.hostname.replace(/^www\./, '');
  } catch { return website; }
}

// Clickable external link subtitle for a provider — used in ranking rows

// provider's site in a new tab. stopPropagation prevents the row's
// stretched link from firing. Long URLs (GitHub paths) truncate with
// ellipsis when the parent column is narrow.
function ProviderDomainLink({ p, size = 'sm' }) {
  if (!p.website) return null;
  const label = websiteLabel(p.website);
  return (

      className={cx(

        size === 'sm' ? 'micro mt-0.5' : 'text-[11px] mt-1 normal-case tracking-normal',
      )}
    >
      <span className={cx('truncate', size === 'sm' ? '' : 'normal-case tracking-normal')}>{label}</span>
      <I.external className="w-2.5 h-2.5 shrink-0"/>
    </a>
  );
}

// Hover/focus tooltip with click-to-toggle for touch. Pops above the trigger
// by default. Content can be a string or JSX. Width capped so long sentences
// still wrap nicely on narrow screens.
function Tooltip({ content, side = 'top', children, className = '', width = 240 }) {
  const [open, setOpen] = useState(false);
  useEffect(() => {
    if (!open) return;
    const onEsc = (e) => e.key === 'Escape' && setOpen(false);
    document.addEventListener('keydown', onEsc);
    return () => document.removeEventListener('keydown', onEsc);
  }, [open]);
  return (
    <span
      className={cx('relative z-10 inline-flex items-center', className)}
      onMouseEnter={() => setOpen(true)}
      onMouseLeave={() => setOpen(false)}
      onFocus={() => setOpen(true)}
      onBlur={() => setOpen(false)}
    >
      <span
        role="button"
        tabIndex={0}
        aria-label="Show explanation"
        onClick={(e) => { e.stopPropagation(); e.preventDefault(); setOpen(o => !o); }}
        className="inline-flex items-center justify-center text-smoke hover:text-bone cursor-help transition-colors"
      >
        {children}
      </span>
      {open && (
        <span
          role="tooltip"
          style={{ width }}
          className={cx(
            'absolute z-50 px-3 py-2 bg-ink-800 border border-ink-500 text-[11px] text-ash leading-relaxed shadow-lg whitespace-normal text-left normal-case tracking-normal',
            side === 'top'    && 'bottom-full left-1/2 -translate-x-1/2 mb-2',
            side === 'bottom' && 'top-full left-1/2 -translate-x-1/2 mt-2',
            side === 'left'   && 'right-full top-1/2 -translate-y-1/2 mr-2',
            side === 'right'  && 'left-full top-1/2 -translate-y-1/2 ml-2',
          )}
        >
          {content}
        </span>
      )}
    </span>
  );
}

function Sparkline({ data, color = 'currentColor', w = 80, h = 22 }) {
  if (!data?.length) return null;
  const min = Math.min(...data), max = Math.max(...data);
  const range = max - min || 1;
  const pts = data.map((v, i) => {
    const x = (i / (data.length - 1)) * w;
    const y = h - ((v - min) / range) * h;
    return `${x.toFixed(1)},${y.toFixed(1)}`;
  }).join(' ');
  return (
    <svg viewBox={`0 0 ${w} ${h}`} width={w} height={h} className="block">
      <polyline points={pts} className="spark" stroke={color} />
    </svg>
  );
}

// Animated number that eases up from 0 to `target` on mount.
// Used in the Hero credibility strip to make the stats feel live.
function CountUp({ target, duration = 1100, format = (n) => n.toLocaleString() }) {
  const [n, setN] = useState(0);
  useEffect(() => {
    let raf;
    const start = performance.now();
    const tick = (now) => {
      const t = Math.min(1, (now - start) / duration);
      const e = 1 - Math.pow(1 - t, 3); // easeOutCubic
      setN(Math.round(target * e));
      if (t < 1) raf = requestAnimationFrame(tick);
    };
    raf = requestAnimationFrame(tick);
    return () => cancelAnimationFrame(raf);
  }, [target, duration]);
  return <span className="num text-bone">{format(n)}</span>;
}

function ProviderFallback({ text, size }) {
  return (
    <div
      className="flex items-center justify-center serif shrink-0 bg-ink-700 text-bone"
      style={{ width: size, height: size, fontSize: size * 0.5 }}
    >
      {text}
    </div>
  );
}

function ProviderMark({ slug, size = 36 }) {
  const p = PROVIDERS.find(x => x.slug === slug);
  const [failed, setFailed] = useState(false);

  if (!p) return <ProviderFallback text="?" size={size}/>;

  // Clearbit returns transparent PNGs; sit them on a small white plate so
  // brand color reads against either dark or light theme.
  if (p.domain && !failed) {
    return (
      <img
        src={`https://logo.clearbit.com/${p.domain}`}
        alt={p.name}
        width={size}
        height={size}
        loading="lazy"
        onError={() => setFailed(true)}
        className="shrink-0 rounded-sm bg-white object-contain"
        style={{ width: size, height: size, padding: Math.max(2, size * 0.06) }}
      />
    );
  }

  if (PROVIDER_SVG[slug]) {
    return (
      <span
        className="shrink-0 inline-flex items-center justify-center"
        style={{ width: size, height: size }}
        aria-label={p.name}
      >
        {PROVIDER_SVG[slug]}
      </span>
    );
  }

  return <ProviderFallback text={p.name[0]} size={size}/>;
}

function TrustBar({ value }) {
  const tone = trustTone(value);
  const c = { brand: 'bg-brand', amber: 'bg-amber', coral: 'bg-coral' }[tone];
  return (
    <div className="mt-1.5 h-px bg-ink-500 relative overflow-hidden" style={{ width: 100 }}>
      <div className={cx('absolute inset-y-0 left-0', c)} style={{ width: `${value}%` }}></div>
    </div>
  );
}

function Dropdown({ label, value, options, onChange }) {
  const [open, setOpen] = useState(false);
  const ref = useRef();
  useEffect(() => {
    const onClick = (e) => { if (ref.current && !ref.current.contains(e.target)) setOpen(false); };
    document.addEventListener('mousedown', onClick);
    return () => document.removeEventListener('mousedown', onClick);
  }, []);
  return (
    <div className="relative" ref={ref}>
      <button onClick={()=>setOpen(!open)} className="flex items-center gap-2 px-3 py-1.5 text-[12px] border border-ink-500 hover:border-bone transition-colors">
        <span className="micro text-smoke">{label}</span>
        <span className="text-bone">{value}</span>
        <svg viewBox="0 0 12 12" className="w-2.5 h-2.5 text-ash"><path d="M3 5l3 3 3-3" stroke="currentColor" fill="none" strokeWidth="1.25"/></svg>
      </button>
      {open && (
        <div className="absolute top-full left-0 mt-1 w-48 card z-30 py-1">
          {options.map(o => (
            <button key={o.v} onClick={()=>{onChange(o.v); setOpen(false);}} className="w-full text-left px-3 py-2 text-[12px] text-ash hover:bg-ink-700 hover:text-bone transition-colors">
              {o.l}
            </button>
          ))}
        </div>
      )}
    </div>
  );
}

function RangeInput({ min, max, step = 1, value, onChange, disabled = false }) {
  const pct = ((value - min) / (max - min)) * 100;
  return (
    <input
      type="range"
      min={min}
      max={max}
      step={step}
      value={value}
      disabled={disabled}
      onChange={e => onChange(+e.target.value)}
      className="range-brand"
      style={{ '--pct': `${pct}%` }}
    />
  );
}

function ModelDropdown({ value, onChange, disabled = false, showOwner = true }) {
  const [open, setOpen] = useState(false);
  const ref = useRef();
  useEffect(() => {
    const onClick = (e) => { if (ref.current && !ref.current.contains(e.target)) setOpen(false); };

          'w-full flex items-center justify-between gap-2 bg-ink-800 border px-3 py-2 text-[13px] text-bone transition-colors',
          disabled ? 'border-ink-500 opacity-60 cursor-not-allowed' : open ? 'border-brand/60' : 'border-ink-500 hover:border-bone'

function RunPage() {
  const { t } = useLang();
  const { route } = useRouter();
  const toast = useToast();

  // URL params decide initial selection:
  //   ?provider=X        → single (1 selected)
  //   ?providers=X,Y,Z   → compare (2–5 selected)
  // Legacy ?strategy=cheapest|trusted|overall → resolve to that provider's slug
  const initialSelected = useMemo(() => {
    const single = route.params.provider;
    const multi = (route.params.providers || '').split(',').filter(Boolean);
    const strat = route.params.strategy;
    if (strat === 'cheapest') return [[...PROVIDERS].sort((a, b) => a.cost - b.cost)[0].slug];
    if (strat === 'trusted')  return [[...PROVIDERS].sort((a, b) => b.trust - a.trust)[0].slug];
    if (strat === 'overall')  return [[...PROVIDERS].sort((a, b) => b.overall - a.overall)[0].slug];
    if (single) return [single];
    if (multi.length >= 2) return multi.slice(0, 5);
    if (multi.length === 1) return multi;
    return [];
  }, []);

  const [prompt, setPrompt] = useState('Explain account abstraction in simple terms. Cover ERC-4337, paymasters, and trade-offs.');
  const [model, setModel] = useState('openai/gpt-5.5');
  const [selected, setSelected] = useState(initialSelected);
  const [temperature, setTemperature] = useState(0);
  const [maxTokens, setMaxTokens] = useState(1024);
  const [run, setRun] = useState(null);
  const [history, setHistory] = useState([]);
  const promptRef = useRef(null);

  const fullPrompt = prompt;

  // Estimated cost: depends on prompt length × selected providers' avg cost
  const estimatedCost = useMemo(() => {
    if (selected.length < 1) return 0;
    const inToks = Math.max(40, Math.round(fullPrompt.length / 4));
    const expectedOut = Math.min(maxTokens, 800);
    const sum = selected.reduce((acc, slug) => {
      const p = PROVIDERS.find(x => x.slug === slug);
      if (!p) return acc;
      return acc + tokenCost(p, inToks, expectedOut);
    }, 0);
    return sum;
  }, [selected, fullPrompt, maxTokens]);

  const allDone = run && run.providers.every(r => r.status === 'completed' || r.status === 'failed');
  const completed = run?.providers.filter(r => r.status === 'completed') ?? [];

  const buildScores = (providers) => {
    const finished = providers.filter(r => r.status === 'completed');
    if (!finished.length) return providers;
    // Scorecard pulls the static GatewayBench panel verdict (L1/L2/L3/overall/tier)
    // rather than recomputing from this single run — single-shot measurements
    // aren't reliable enough to override continuous-panel scores.
    return providers.map(r => {
      if (r.status !== 'completed') return r;
      const p = PROVIDERS.find(x => x.slug === r.slug);
      return { ...r, scores: { L1: p.L1, L2: p.L2, L3: p.L3, overall: p.overall, tier: p.tier } };
    });
  };

  const launchOne = (slug, runId, idx) => {
    const startDelay = 80 + idx * 200;
    const t1 = setTimeout(() => {
      setRun(prev => prev && prev.id === runId ? {
        ...prev,
        providers: prev.providers.map(p => p.slug === slug ? { ...p, status: 'running', startAt: Date.now() } : p),
      } : prev);
    }, startDelay);

    const finishDelay = startDelay + 900 + (strHash(slug + runId) % 1500);
    const t2 = setTimeout(() => {
      const provider = PROVIDERS.find(x => x.slug === slug);
      const failProb = slug === 'replicate' ? 0.45 : slug === 'anyscale' ? 0.08 : 0.0;
      const fail = (strHash(slug + runId + 'f') % 100) / 100 < failProb;
      const inputTokens = Math.max(40, Math.round(fullPrompt.length / 4));
      const baseOut = 280 + (strHash(slug + runId + 'o') % 480);
      const outputTokens = Math.round(baseOut * (PROVIDER_STYLE[slug]?.verbosity ?? 1));
      const cost = tokenCost(provider, inputTokens, outputTokens);
      const latencyJitter = ((strHash(slug + runId + 'l') % 100) - 50) / 200;
      const ttftJitter = ((strHash(slug + runId + 't') % 100) - 50) / 500;

      setRun(prev => {
        if (!prev || prev.id !== runId) return prev;
        const next = {
          ...prev,
          providers: prev.providers.map(p => p.slug === slug ? {
            ...p,
            status: fail ? 'failed' : 'completed',
            completeAt: Date.now(),
            latency: Math.max(0.3, provider.latency + latencyJitter),
            ttft: Math.max(0.1, provider.ttft + ttftJitter),
            cost: fail ? null : cost,
            inputTokens, outputTokens,
            response: fail ? null : getMockResponse(fullPrompt, slug),
            error: fail ? 'Timeout after 30s · cold start on shared GPU' : null,
          } : p),
        };
        return { ...next, providers: buildScores(next.providers) };
      });
    }, finishDelay);

    return [t1, t2];
  };

  const doStart = () => {
    if (selected.length < 1 || !prompt) return;
    const id = 'run_' + Math.random().toString(36).slice(2, 9);
    const modelObj = MODELS.find(m => m.id === model);
    setRun({
      id,
      prompt: fullPrompt,
      promptPreview: prompt.slice(0, 120),
      benchmark: detectBenchmark(fullPrompt),
      modelId: model,
      modelDisplay: modelObj?.display || model,
      mode: selected.length === 1 ? 'single' : 'compare',
      providers: selected.map(slug => ({ slug, status: 'pending' })),
    });
  };

  const start = () => {
    if (selected.length < 1 || !prompt) return;
    doStart();
  };

  const retry = (slug) => {
    if (!run) return;
    setRun(prev => ({
      ...prev,
      providers: prev.providers.map(p => p.slug === slug ? { slug, status: 'pending' } : p),
    }));
  };

  // Launch pending providers — uses a ref-based registry so the
  // in-flight completion timers aren't clobbered when a sibling provider
  // flips to "running" and triggers a re-render.
  const launchedRef = useRef({});
  useEffect(() => {
    if (!run) return;
    run.providers.forEach((r, i) => {
      if (r.status !== 'pending') return;
      const key = run.id + ':' + r.slug;
      // Retry case: clear any prior (already-fired) timers, schedule fresh.
      if (launchedRef.current[key]) {
        launchedRef.current[key].forEach(clearTimeout);
      }
      launchedRef.current[key] = launchOne(r.slug, run.id, i);
    });
    // No cleanup here — letting timers run to completion. Stale timers
    // from a discarded run are harmless because launchOne checks
    // `prev.id === runId` before mutating state.
  }, [run?.id, run?.providers.map(r => r.slug + r.status).join('|')]);

  // When the run.id changes (new comparison) or component unmounts,
  // clear every outstanding timer.
  useEffect(() => {
    return () => {
      Object.values(launchedRef.current).forEach(arr => arr.forEach(clearTimeout));
      launchedRef.current = {};
    };
  }, [run?.id]);

  // Record completed runs in history (once per run.id)
  const recordedRuns = useRef(new Set());
  useEffect(() => {
    if (!run || !allDone) return;
    if (recordedRuns.current.has(run.id)) return;
    recordedRuns.current.add(run.id);
    setHistory(h => [{
      id: run.id,
      prompt: prompt,
      mode: run.mode,
      modelDisplay: run.modelDisplay,
      providerSlugs: run.providers.map(r => r.slug),
      providers: run.providers,
      timestamp: Date.now(),
    }, ...h].slice(0, 5));
  }, [allDone, run?.id]);

  // Cmd+Enter / Ctrl+Enter to run
  useEffect(() => {
    const onKey = (e) => {
      if ((e.metaKey || e.ctrlKey) && e.key === 'Enter') {
        e.preventDefault();
        if (!run || allDone) start();
      }
      if (e.key === 'Escape' && document.activeElement === promptRef.current) {
        promptRef.current?.blur();
      }
    };
    document.addEventListener('keydown', onKey);
    return () => document.removeEventListener('keydown', onKey);
  }, [prompt, selected, run, allDone]);

  return (
    <Fragment>
      <section className="max-w-[1440px] mx-auto px-4 sm:px-6 lg:px-8 pt-12 pb-6 border-b border-ink-600">
        <div className="flex items-end justify-between flex-wrap gap-4">
          <div>
            <div className="micro text-smoke">{t('run.tool')}</div>
            <h1 className="serif text-4xl sm:text-5xl lg:text-6xl tracking-editorial mt-2">
              {t('run.headPre')} <span className="serif-it text-brand">{selected.length === 1 ? t('run.headOneAnswer') : t('run.headNTruths')}</span>
            </h1>
            <p className="text-ash mt-3 max-w-2xl text-[15px] leading-relaxed">
              {selected.length === 1 ? t('run.subSingle') : t('run.subCompare')}
            </p>
          </div>
          {run && (
            <div className="flex items-center gap-2">
              <button
                onClick={() => { setRun(null); promptRef.current?.focus(); }}
                className="btn-ghost px-4 py-2 text-[12px] inline-flex items-center gap-2"
              >
                <I.refresh className="w-3.5 h-3.5"/> {t('run.newComparison')}
              </button>
              <button
                onClick={() => { copyToClipboard(window.location.href); toast.show(t('run.runLinkCopied')); }}
                className="btn-ghost px-4 py-2 text-[12px] inline-flex items-center gap-2"
              >
                <I.copy className="w-3.5 h-3.5"/> {t('run.share')}
              </button>
            </div>
          )}
        </div>
      </section>

      <div className="max-w-[1440px] mx-auto px-4 sm:px-6 lg:px-8 pt-10 grid lg:grid-cols-[420px_1fr] gap-px bg-ink-600">

        {/* SETUP PANEL */}
        <div className="bg-ink p-5 sm:p-6 lg:p-8 space-y-8">
          <div>
            <div className="micro text-smoke mb-3">{t('run.labelPrompt')}</div>
            <textarea
              ref={promptRef}
              value={prompt}
              onChange={e=>setPrompt(e.target.value)}
              rows={5}
              className="w-full bg-ink-800 border border-ink-500 focus:border-brand/60 outline-none p-3 text-[13px] resize-none text-bone leading-relaxed"
              placeholder={t('run.promptPlaceholder')}
            />
            <div className="mt-1 flex justify-end">
              <div className="micro text-smoke">
                <span className="kbd">⌘</span><span className="kbd ml-0.5">↩</span> {t('run.runHotkey')}
              </div>
            </div>
            <div className="mt-4 pt-4 border-t border-ink-600">
              <div className="micro text-smoke mb-2">{t('run.samplesLabel')}</div>
              <div className="flex flex-wrap gap-1.5">
                {BENCHMARK_TEMPLATES.map(tpl => {
                  const localizedPrompt = t('run.tplPrompts.' + tpl.id) || tpl.prompt;

          <Section label={t('run.labelProviders')}>

                    className={cx(

                      on ? 'border-brand/60 bg-brand/5' : 'border-ink-600 hover:border-bone/30'

                    <ProviderMark slug={p.slug}/>

          </Section>

          <button
            onClick={start}
            disabled={!prompt || selected.length < 1 || (run && !allDone)}
            className="btn-brand w-full py-3.5 text-sm font-medium tracking-tight inline-flex items-center justify-center gap-2 disabled:opacity-40 disabled:cursor-not-allowed"
          >
            <I.play className="w-4 h-4 fill-current"/>
            {run && !allDone
              ? t('run.btnRunning')
              : run
                ? (selected.length >= 2 ? t('run.btnRerunCompare') : t('run.btnRerun'))
                : (selected.length >= 2 ? t('run.btnRunCompare') : t('run.btnRun'))}
          </button>
          <div className="flex items-center justify-between micro text-smoke">
            <span>{t('run.estimatedCost')}</span>
            <span className="num text-ash">~{fmtUSD(estimatedCost, 4)}</span>
          </div>
        </div>

        {/* RESULTS */}
        <div className="bg-ink p-5 sm:p-6 lg:p-8 min-h-[600px]">
          {!run ? (
            <EmptyRun mode={selected.length === 1 ? 'single' : 'compare'}/>
          ) : selected.length === 1 ? (
            <SingleProviderResult run={run}/>
          ) : (
            <div className="space-y-10">
              <RunStatusList run={run} onRetry={retry}/>
              {/* ResponseGrid renders progressively — pending/running/done
                   cards all appear together so faster routers stream while
                   slower ones are still loading. */}
              {run.providers.some(r => r.status !== 'pending') && (
                <ResponseGrid run={run}/>
              )}
              {allDone && completed.length >= 1 && (
                <Fragment>
                  <SummaryCards run={run}/>
                  <EvaluationTable run={run}/>
                  <DifferenceAnalysis run={run}/>
                  <RecommendedAction run={run}/>
                </Fragment>
              )}
            </div>
          )}
        </div>
      </div>

      {/* Recent runs */}
      {history.length > 0 && (
        <RecentRuns history={history} onClear={() => setHistory([])} onReuse={(h) => {
          setPrompt(h.prompt);
          setSelected(h.providerSlugs);
          promptRef.current?.focus();
          window.scrollTo({ top: 0, behavior: 'smooth' });
        }}/>
      )}
    </Fragment>
  );
}

function Section({ label, children }) {
  return (
    <div>
      <div className="micro text-smoke mb-3">{label}</div>
      {children}
    </div>
  );
}

function EmptyRun({ mode }) {
  const { t } = useLang();
  return (
    <div className="h-full flex items-center justify-center text-center py-32">
      <div className="max-w-md">
        <div className="serif text-7xl serif-it text-ink-500 mb-6">{mode === 'single' ? '∅' : 'N=0'}</div>
        <div className="micro text-smoke mb-3">{t('run.emptyAwaiting')}</div>
        <h3 className="serif text-3xl tracking-editorial">
          {mode === 'single'
            ? <Fragment>{t('run.emptySingleTitle')} <span className="serif-it text-brand">{t('run.emptyYet')}</span>.</Fragment>
            : <Fragment>{t('run.emptyCompareTitle')} <span className="serif-it text-brand">{t('run.emptyYet')}</span>.</Fragment>}
        </h3>
        <p className="mt-3 text-ash text-[14px] leading-relaxed">
          {mode === 'single'
            ? <Fragment>{t('run.emptySingleBodyA')}<span className="text-brand">{t('run.btnRun')}</span>.</Fragment>
            : <Fragment>{t('run.emptyCompareBodyA')}<span className="text-brand">{t('run.btnRun')}</span>{t('run.emptyBodyB')}</Fragment>}
        </p>
        <div className="mt-8 flex justify-center gap-2 micro text-smoke">
          <span className="kbd">⌘</span><span className="kbd">↩</span>

function SingleProviderResult({ run }) {
  const { t } = useLang();
  const r = run.providers[0];
  const p = PROVIDERS.find(x => x.slug === r.slug);
  const responseText = r.status === 'completed' ? (r.response || '') : '';
  const stream = useStreamingText(responseText, 14);

  const phaseLabel = {
    pending: t('run.phaseQueued'),
    running: t('run.phaseStreaming'),
    completed: t('run.phaseComplete'),
    failed: t('run.phaseFailed'),
  }[r.status];
  const phaseTone = r.status === 'failed' ? 'text-coral' : r.status === 'completed' ? 'text-ash' : 'text-brand';

  // Cheaper alternative — flag when current provider isn't the global cheapest
  const cheaperAlt = useMemo(() => {
    const cheapest = [...PROVIDERS].sort((a, b) => a.cost - b.cost)[0];
    if (cheapest.slug === p.slug) return null;
    const savings = Math.round(((p.cost - cheapest.cost) / p.cost) * 100);
    if (savings < 8) return null;
    return { provider: cheapest, savings };
  }, [p.slug]);

  return (
    <div className="flex flex-col">
      {/* Header strip */}
      <div className="flex items-center justify-between border-b border-ink-600 pb-4 mb-4 gap-3 flex-wrap">
        <div className="flex items-center gap-3">
          <ProviderMark slug={r.slug}/>
          <div>
            <div className="text-[14px] text-bone">{p.name}</div>
            <div className="micro text-smoke flex items-center gap-2">
              <span>{p.type}</span>
              <span>·</span>
              <span className="inline-flex items-center gap-1">
                {r.status === 'running' && <span className="w-1.5 h-1.5 bg-brand rounded-full pulse-dot"/>}
                {r.status === 'completed' && stream.done && <span className="w-1.5 h-1.5 bg-brand rounded-full"/>}
                {r.status === 'failed' && <span className="w-1.5 h-1.5 bg-coral rounded-full"/>}
                <span className={phaseTone}>{r.status === 'completed' && !stream.done ? t('run.phaseStreaming') : phaseLabel}</span>
              </span>
            </div>
          </div>
        </div>
        <TrustBadge score={p.trust} size="lg"/>
      </div>

      {/* Output */}
      <div className="flex-1 min-h-[280px] py-2">
        {r.status === 'pending' && (
          <div className="micro text-smoke flex items-center gap-2"><span className="w-1.5 h-1.5 bg-smoke rounded-full"/>{t('run.phaseQueued')}</div>
        )}
        {r.status === 'running' && (
          <div className="space-y-2 text-[13px] text-ash">
            <div className="micro text-brand flex items-center gap-2 mb-3">
              <I.spin className="w-3 h-3 animate-spin"/> {t('run.connectingTo', { name: p.name })}
            </div>
            <div className="shimmer h-3 w-2/3"></div>
            <div className="shimmer h-3 w-3/4"></div>
            <div className="shimmer h-3 w-1/2"></div>
          </div>
        )}
        {r.status === 'failed' && (
          <div className="text-coral text-[13px]">
            <I.x className="w-4 h-4 inline mr-1"/>
            {t('run.failedPrefix')}{r.error}
          </div>
        )}
        {r.status === 'completed' && (
          <pre className="whitespace-pre-wrap text-[13px] leading-relaxed text-bone font-mono overflow-y-auto pr-2">
            {stream.shown}
            {!stream.done && <span className="inline-block w-2 h-4 bg-brand ml-0.5 align-middle pulse-dot"></span>}
          </pre>
        )}
      </div>

      {/* Bottom stats + pay */}
      <div className="mt-4 pt-4 border-t border-ink-600 flex items-center justify-between flex-wrap gap-4">
        <div className="flex items-center gap-6 overflow-x-auto no-scroll-x">
          <div className="shrink-0">
            <div className="micro text-smoke">{t('run.colCost')}</div>
            <div className="num text-bone text-[14px] mt-1">{r.cost != null ? fmtUSD(r.cost, 4) : '—'}</div>
          </div>
          <div className="shrink-0">
            <div className="micro text-smoke">{t('run.colLatency')}</div>
            <div className="num text-bone text-[14px] mt-1">{r.latency != null ? r.latency.toFixed(2) + 's' : '—'}</div>
          </div>
          <div className="shrink-0">
            <div className="micro text-smoke">{t('run.colTtft')}</div>
            <div className="num text-bone text-[14px] mt-1">{r.ttft != null ? (r.ttft * 1000).toFixed(0) + 'ms' : '—'}</div>
          </div>
          <div className="shrink-0">
            <div className="micro text-smoke">{t('run.colTokens')}</div>
            <div className="num text-bone text-[14px] mt-1">{r.outputTokens ? `${r.inputTokens} / ${r.outputTokens}` : '—'}</div>
          </div>
          <div className="shrink-0">
            <div className="micro text-smoke">{t('run.colTrust')}</div>
            <div className="num text-bone text-[14px] mt-1">{p.trust}</div>
          </div>
        </div>
        {cheaperAlt && (
          <span className="text-[12px] text-amber">
            {t('run.cheaperLabel')} <span className="text-brand">{cheaperAlt.provider.name} (−{cheaperAlt.savings}%)</span>
          </span>
        )}
      </div>
    </div>
  );
}

function RecentRuns({ history, onClear, onReuse }) {
  const { t } = useLang();
  const toast = useToast();
  return (
    <div className="max-w-[1440px] mx-auto px-4 sm:px-6 lg:px-8 mt-12">
      <div className="flex items-center justify-between mb-4">
        <div>
          <div className="micro text-smoke">{t('run.recentRuns')}</div>
          <h3 className="serif text-3xl sm:text-4xl lg:text-5xl tracking-editorial mt-1">{t('run.yourLast')} <span className="serif-it text-brand">{history.length}</span></h3>
        </div>
        <button onClick={onClear} className="micro text-smoke hover:text-bone">{t('run.clear')}</button>
      </div>
      <div className="space-y-px bg-ink-600 border border-ink-600">
        {history.map(h => {
          const completed = h.providers.filter(r => r.status === 'completed');
          const totalCost = completed.reduce((s, r) => s + (r.cost || 0), 0);
          const isCompare = h.providers.length > 1;
          return (
            <div key={h.id} className="bg-ink p-4 flex flex-col md:grid md:grid-cols-[200px_1fr_auto] gap-3 md:gap-4 md:items-center">
              <div className="flex items-center gap-2">
                <div className="flex -space-x-2">
                  {h.providers.slice(0, 3).map(r => (
                    <div key={r.slug} className="ring-1 ring-ink rounded-sm">
                      <ProviderMark slug={r.slug} size={28}/>
                    </div>
                  ))}
                  {h.providers.length > 3 && (
                    <div className="w-7 h-7 flex items-center justify-center bg-ink-700 text-ash text-[10px] num ring-1 ring-ink">+{h.providers.length - 3}</div>
                  )}
                </div>
                <div className="ml-1">
                  <div className="text-[13px] text-bone">{isCompare ? t('run.providersCount', { n: h.providers.length }) : PROVIDERS.find(p => p.slug === h.providers[0].slug)?.name}</div>
                  <div className="micro text-smoke">{isCompare ? t('run.modeCompare') : t('run.modeSingleShort')} · {h.modelDisplay}</div>
                </div>
              </div>
              <div className="text-[12px] text-ash line-clamp-2 md:truncate">{h.prompt}</div>
              <div className="flex items-center justify-between md:justify-start gap-6">
                <div className="text-left md:text-right">
                  <div className="num text-[12px] text-bone">{fmtUSD(totalCost, 4)}</div>
                  <div className="micro text-smoke">{t('run.okFraction', { c: completed.length, t: h.providers.length })}</div>
                </div>
                <div className="flex items-center gap-1">
                  <button
                    onClick={() => {
                      const r = h.providers.find(r => r.status === 'completed');
                      if (r?.response) { copyToClipboard(r.response); toast.show(t('run.responseCopied')); }
                    }}
                    title={t('run.copyFirst')}
                    className="text-smoke hover:text-bone p-1.5"
                  ><I.copy className="w-3.5 h-3.5"/></button>
                  <button
                    onClick={() => onReuse(h)}
                    title={t('run.reUse')}
                    className="text-smoke hover:text-bone p-1.5"

                </div>

            </div>
          );
        })}
      </div>
    </div>

function RunStatusList({ run, onRetry }) {
  const { t } = useLang();
  const allDone = run.providers.every(r => r.status === 'completed' || r.status === 'failed');
  const completedCount = run.providers.filter(r => r.status === 'completed').length;
  const failedCount = run.providers.filter(r => r.status === 'failed').length;
  return (
    <div>
      <div className="flex items-center justify-between mb-4">
        <div>
          <div className="micro text-smoke">{t('run.runIdLabel')}<span className="num">{run.id}</span> · <span className="text-ash">{t('run.benchDetected.' + (run.benchmark || 'default'))}</span></div>
          <div className="serif text-2xl tracking-editorial mt-1">
            {allDone ? (
              <Fragment>{t('run.compareComplete')} <span className="serif-it text-brand">{t('run.compareCompleteIt')}</span></Fragment>
            ) : (
              <Fragment>{t('run.runningCompare')}<span className="serif-it text-brand">.</span></Fragment>
            )}
          </div>
        </div>
        <div className="text-right">
          <div className="micro text-smoke">{t('run.compareCompletedFraction', { c: completedCount, t: run.providers.length })}</div>
          {failedCount > 0 && <div className="micro text-coral mt-0.5">{t('run.compareFailedCount', { n: failedCount })}</div>}
        </div>
      </div>
      <div className="space-y-2">
        {run.providers.map(r => {
          const provider = PROVIDERS.find(p=>p.slug===r.slug);
          const ic = {
            pending: <span className="text-smoke">○</span>,
            running: <I.spin className="w-3.5 h-3.5 text-brand animate-spin"/>,
            completed: <I.check className="w-3.5 h-3.5 text-brand"/>,
            failed: <I.x className="w-3.5 h-3.5 text-coral"/>,
          }[r.status];
          return (
            <div key={r.slug} className={cx(
              'flex items-center gap-4 px-4 py-3 border transition-colors',
              r.status === 'running' ? 'border-brand/40' :
              r.status === 'failed' ? 'border-coral/30' : 'border-ink-600'
            )}>
              <div className="w-5 flex items-center justify-center">{ic}</div>
              <ProviderMark slug={r.slug}/>
              <div className="flex-1">
                <div className="text-[13px] text-bone">{provider.name}</div>
                <div className="micro text-smoke">
                  {r.status === 'pending' && t('run.phaseQueuedShort')}
                  {r.status === 'running' && t('run.phaseStreamingShort')}
                  {r.status === 'completed' && t('run.returnedIn', { l: r.latency.toFixed(2), ms: (r.ttft*1000).toFixed(0) })}
                  {r.status === 'failed' && r.error}
                </div>
              </div>
              {r.status === 'completed' && (
                <div className="text-right num text-[12px]">
                  <div className="text-bone">{fmtUSD(r.cost, 4)}</div>
                  <div className="text-smoke text-[11px]">{r.outputTokens} out</div>
                </div>
              )}
              {r.status === 'running' && (
                <div className="w-24 h-px bg-ink-500 relative overflow-hidden shimmer"></div>
              )}
              {r.status === 'failed' && (
                <button
                  onClick={() => onRetry(r.slug)}
                  className="text-[11px] text-ash hover:text-bone inline-flex items-center gap-1.5 px-2.5 py-1 border border-ink-500 hover:border-bone transition-colors"
                >
                  <I.refresh className="w-3 h-3"/> {t('run.retry')}
                </button>
              )}
            </div>
          );
        })}
      </div>
    </div>
  );
}

function SummaryCards({ run }) {
  const { t } = useLang();
  const completed = run.providers.filter(r => r.status === 'completed' && r.scores);
  if (!completed.length) return null;

  const cheapest = [...completed].sort((a,b) => a.cost - b.cost)[0];
  const fastest = [...completed].sort((a,b) => a.latency - b.latency)[0];
  const trusted = [...completed].sort((a,b) => {
    const tA = PROVIDERS.find(p=>p.slug===a.slug).trust;
    const tB = PROVIDERS.find(p=>p.slug===b.slug).trust;
    return tB - tA;
  })[0];
  const recommended = [...completed].sort((a,b) => b.scores.overall - a.scores.overall)[0];

  const recProvider = PROVIDERS.find(p=>p.slug===recommended.slug);
  const cheapProvider = PROVIDERS.find(p=>p.slug===cheapest.slug);
  const fastProvider = PROVIDERS.find(p=>p.slug===fastest.slug);
  const trustProvider = PROVIDERS.find(p=>p.slug===trusted.slug);

  const avgCost = completed.reduce((s,c) => s + c.cost, 0) / completed.length;
  const cheapPct = Math.round((avgCost / cheapest.cost - 1) * 100);

  return (
    <div>
      <div className="micro text-smoke mb-3">{t('run.verdictRouters', { n: completed.length })}</div>
      <div className="grid grid-cols-2 lg:grid-cols-4 gap-px bg-ink-600">
        <SumCard tag={t('run.sumCheapest')} name={cheapProvider.name} value={fmtUSD(cheapest.cost, 4)} sub={t('run.sumCheapVsAvg', { pct: cheapPct })} tone="brand" slug={cheapest.slug}/>
        <SumCard tag={t('run.sumFastest')} name={fastProvider.name} value={`${fastest.latency.toFixed(2)}s`} sub={t('run.sumTtftMs', { ms: (fastest.ttft*1000).toFixed(0) })} tone="sky" slug={fastest.slug}/>
        <SumCard tag={t('run.sumMostTrusted')} name={trustProvider.name} value={trustProvider.trust} sub={trustLabel(trustProvider.trust)} tone={trustTone(trustProvider.trust)} slug={trusted.slug}/>
        <SumCard tag={t('run.sumRecommended')} name={recProvider.name} value={recommended.scores.overall} sub={t('run.sumBestBalance')} tone="brand" slug={recommended.slug} highlight/>
      </div>
    </div>
  );
}

function SumCard({ tag, name, value, sub, tone, slug, highlight }) {
  const tColor = { brand: 'text-brand', sky: 'text-sky', amber: 'text-amber', coral: 'text-coral' }[tone] || 'text-bone';
  return (
    <div className={cx('p-6 bg-ink', highlight && 'ring-1 ring-brand')}>
      <div className="flex items-center justify-between">
        <div className="micro text-smoke">{tag}</div>
        <ProviderMark slug={slug}/>
      </div>
      <div className="mt-4">
        <div className="text-[13px] text-ash">{name}</div>
        <div className={cx('serif text-5xl mt-1 tracking-editorial', tColor)}>{value}</div>
        <div className="text-[11px] text-smoke mt-1">{sub}</div>
      </div>
    </div>
  );
}

// Per-card response body in compare mode. Streams the text in like an LLM
// (token-by-token via useStreamingText) and shows a blinking cursor while
// not yet finished. Each card runs its own stream so providers that finish
// later visibly stream after providers that finished early.
function StreamingCardBody({ text, isExpanded }) {
  const stream = useStreamingText(text || '', 16);
  return (
    <div className={cx(
      'mt-3 flex-1 text-[12px] leading-relaxed text-ash whitespace-pre-wrap font-mono overflow-y-auto pr-2',
      isExpanded ? '' : 'max-h-[260px] gradient-mask-bottom'
    )}>
      {stream.shown}
      {!stream.done && text && (
        <span className="inline-block w-1.5 h-3 bg-brand ml-0.5 align-middle pulse-dot"/>
      )}
    </div>
  );
}

function ResponseGrid({ run }) {
  const { t } = useLang();
  // Render every selected provider — pending/running/completed/failed —
  // so faster routers visibly stream while slower ones still load.
  const visible = run.providers;
  const [expanded, setExpanded] = useState({});
  const toast = useToast();

  const colCount = Math.min(visible.length, 4);
  const colCls = colCount === 1 ? 'md:grid-cols-1' :
                 colCount === 2 ? 'md:grid-cols-2' :
                 colCount === 3 ? 'md:grid-cols-3 xl:grid-cols-3' :
                                  'md:grid-cols-2 xl:grid-cols-4';

  return (
    <div>
      <div className="micro text-smoke mb-3">{t('run.sideBySide')}</div>
      <div className={cx('grid grid-cols-1 gap-px bg-ink-600', colCls)}>
        {visible.map(r => {
          const p = PROVIDERS.find(x=>x.slug===r.slug);
          const isExpanded = expanded[r.slug];
          return (
            <div key={r.slug} className="bg-ink p-5 flex flex-col">
              <div className="flex items-center justify-between mb-3">
                <div className="flex items-center gap-2">
                  <ProviderMark slug={r.slug}/>
                  <div>
                    <div className="text-[13px] text-bone">{p.name}</div>
                    <div className="micro text-smoke">{p.type}</div>
                  </div>
                </div>
                <div className="flex items-center gap-1">
                  {r.response && (
                    <Fragment>
                      <button
                        onClick={() => { copyToClipboard(r.response); toast.show(t('run.copiedResponse', { name: p.name })); }}
                        title={t('run.copyResponse')}
                        className="text-smoke hover:text-bone p-1"
                      ><I.copy className="w-3.5 h-3.5"/></button>
                      <button
                        onClick={() => setExpanded(s => ({ ...s, [r.slug]: !s[r.slug] }))}
                        title={isExpanded ? t('run.collapse') : t('run.expand')}
                        className="text-smoke hover:text-bone p-1 text-[10px] num"
                      >{isExpanded ? '−' : '+'}</button>
                    </Fragment>
                  )}
                </div>
              </div>
              <div className="grid grid-cols-3 gap-2 py-3 border-y border-ink-600 text-[11px]">
                <div>
                  <div className="micro text-smoke mb-1">{t('run.colCost')}</div>
                  <div className="num text-bone">{r.cost != null ? fmtUSD(r.cost, 4) : '—'}</div>
                </div>
                <div>
                  <div className="micro text-smoke mb-1">{t('run.colLatency')}</div>
                  <div className="num text-bone">{r.latency != null ? r.latency.toFixed(2)+'s' : '—'}</div>
                </div>
                <div>
                  <div className="micro text-smoke mb-1">{t('run.colTokens')}</div>
                  <div className="num text-bone">{r.outputTokens || '—'}</div>
                </div>
              </div>
              {r.status === 'failed' ? (
                <div className="mt-3 flex-1 text-[12px] leading-relaxed font-mono pr-2 max-h-[260px] overflow-y-auto">
                  <div className="text-coral">
                    <I.x className="w-4 h-4 inline mb-1 mr-1"/>
                    {t('run.failedPrefix')}{r.error}
                  </div>
                </div>
              ) : r.status === 'pending' ? (
                <div className="mt-3 flex-1 min-h-[120px] flex items-center justify-center text-[11px] text-smoke">
                  <span className="inline-flex items-center gap-2">
                    <span className="w-1.5 h-1.5 bg-smoke rounded-full"/>
                    {t('run.phaseQueuedShort')}
                  </span>
                </div>
              ) : r.status === 'running' ? (
                <div className="mt-3 flex-1 min-h-[120px] space-y-2 text-[12px]">
                  <div className="micro text-brand flex items-center gap-2 mb-2">
                    <I.spin className="w-3 h-3 animate-spin"/>
                    {t('run.connectingTo', { name: p.name })}
                  </div>
                  <div className="shimmer h-3 w-2/3"></div>
                  <div className="shimmer h-3 w-3/4"></div>
                  <div className="shimmer h-3 w-1/2"></div>
                  <div className="shimmer h-3 w-3/5"></div>
                </div>
              ) : (
                <StreamingCardBody text={r.response} isExpanded={isExpanded}/>
              )}
              <div className="mt-3 pt-3 border-t border-ink-600 flex items-center justify-between">
                <TrustBadge score={p.trust}/>
                {r.status === 'failed' ? (

function DifferenceAnalysis({ run }) {
  const { t } = useLang();
  const completed = run.providers.filter(r => r.status === 'completed');
  if (completed.length < 2) return null;
  const longest = completed.reduce((a, b) => (a.outputTokens > b.outputTokens ? a : b));
  const shortest = completed.reduce((a, b) => (a.outputTokens < b.outputTokens ? a : b));
  const longestP = PROVIDERS.find(p=>p.slug===longest.slug);
  const shortestP = PROVIDERS.find(p=>p.slug===shortest.slug);

  const median = (arr) => {
    const s = [...arr].sort((a,b) => a-b);
    return s[Math.floor(s.length/2)];
  };
  const medOut = median(completed.map(r => r.outputTokens));
  const drift = completed.find(r => r.outputTokens > medOut * 1.35 || r.outputTokens < medOut * 0.65);
  const driftP = drift ? PROVIDERS.find(p => p.slug === drift.slug) : null;

  const benchKey = run.benchmark || 'default';
  const benchKeyCap = benchKey.charAt(0).toUpperCase() + benchKey.slice(1);
  const commentary = t('run.bench' + benchKeyCap);

  // Trust flags
  const trustFlags = [];
  completed.forEach(r => {
    const p = PROVIDERS.find(x => x.slug === r.slug);
    if (p.trustParts.fallbackTransparency < 75) {
      trustFlags.push(t('run.diffTrustFlag', { name: p.name, score: p.trustParts.fallbackTransparency }));
    }
  });

  const failedCount = run.providers.filter(r => r.status === 'failed').length;

  return (
    <div>
      <div className="micro text-smoke mb-3">{t('run.diffLabel')}</div>
      <div className="card p-6 grid md:grid-cols-2 gap-6">
        <div>
          <h4 className="serif text-2xl tracking-editorial">{t('run.diffWhatWeNoticed')}</h4>
          <ul className="mt-4 space-y-2.5 text-[13px] leading-relaxed">
            <li className="flex gap-2"><span className="text-brand shrink-0">+</span><span><span className="text-bone">{longestP.name}</span> {t('run.diffLongest', { tok: longest.outputTokens })}</span></li>
            <li className="flex gap-2"><span className="text-amber shrink-0">~</span><span><span className="text-bone">{shortestP.name}</span> {t('run.diffShortest', { tok: shortest.outputTokens, pct: Math.round((shortest.outputTokens / longest.outputTokens) * 100) })}</span></li>
            <li className="flex gap-2"><span className="text-sky shrink-0">→</span><span>{commentary}</span></li>
            {driftP && (
              <li className="flex gap-2"><span className="text-coral shrink-0">!</span><span><span className="text-bone">{driftP.name}</span> {t('run.diffDrift', { pct: Math.round(((drift.outputTokens / medOut) - 1) * 100) })}</span></li>
            )}
            {failedCount > 0 && (
              <li className="flex gap-2"><span className="text-coral shrink-0">×</span><span><span className="text-bone">{failedCount}</span> {failedCount > 1 ? t('run.diffFailedPlural') : t('run.diffFailedSingular')}</span></li>
            )}
            {trustFlags.slice(0, 1).map((f, i) => (
              <li key={i} className="flex gap-2"><span className="text-amber shrink-0">⚠</span><span>{f}</span></li>
            ))}
          </ul>
        </div>
        <div>
          <h4 className="serif text-2xl tracking-editorial">{t('run.diffOutputStats')}</h4>
          <div className="mt-4 space-y-3">
            {completed.map(r => {
              const max = Math.max(...completed.map(c=>c.outputTokens));
              const p = PROVIDERS.find(x=>x.slug===r.slug);
              return (
                <div key={r.slug} className="flex items-center gap-3">
                  <div className="w-20 text-[12px] text-ash truncate">{p.name}</div>
                  <div className="flex-1 h-1 bg-ink-500 relative overflow-hidden">
                    <div className="absolute inset-y-0 left-0 bg-brand/60" style={{ width: `${(r.outputTokens/max)*100}%` }}></div>
                  </div>
                  <div className="num text-[11px] text-bone w-12 text-right">{r.outputTokens}</div>
                </div>
              );
            })}
          </div>
          <div className="mt-5 pt-5 border-t border-ink-600 grid grid-cols-3 gap-3 text-[11px]">
            <div>
              <div className="micro text-smoke mb-1">{t('run.diffMedian')}</div>
              <div className="num text-bone">{medOut}</div>
            </div>
            <div>
              <div className="micro text-smoke mb-1">{t('run.diffSpread')}</div>
              <div className="num text-bone">{Math.round(((longest.outputTokens / shortest.outputTokens) - 1) * 100)}%</div>
            </div>
            <div>
              <div className="micro text-smoke mb-1">{t('run.diffConflicts')}</div>
              <div className="text-[11px] text-smoke">{t('run.diffNoneFlagged')}</div>
            </div>
          </div>
        </div>
      </div>
    </div>
  );
}

function RecommendedAction({ run }) {
  const { t } = useLang();
  const completed = run.providers.filter(r => r.status === 'completed' && r.scores);
  if (!completed.length) return null;

  const recommended = [...completed].sort((a,b) => b.scores.overall - a.scores.overall)[0];
  const cheapest = [...completed].sort((a,b) => a.cost - b.cost)[0];
  const trusted = [...completed].sort((a,b) => {
    const tA = PROVIDERS.find(p=>p.slug===a.slug).trust;
    const tB = PROVIDERS.find(p=>p.slug===b.slug).trust;
    return tB - tA;
  })[0];

  const recP = PROVIDERS.find(p=>p.slug===recommended.slug);
  const cheapP = PROVIDERS.find(p=>p.slug===cheapest.slug);
  const trustP = PROVIDERS.find(p=>p.slug===trusted.slug);

  const isSame = (p) => p.slug === recP.slug;

  return (
    <div className="card-2 p-8 ring-1 ring-brand/30 relative overflow-hidden">
      <div className="absolute top-0 left-0 right-0 h-px bg-brand"></div>
      <div className="grid md:grid-cols-[1fr_auto] gap-8 items-end">
        <div>
          <div className="micro text-smoke">{t('run.verdict')}</div>
          <h3 className="serif text-3xl sm:text-4xl lg:text-5xl tracking-editorial mt-2">
            {t('run.useHeadline')} <span className="serif-it text-brand">{recP.name}</span>.
          </h3>
          <p className="mt-3 text-ash text-[14px] max-w-xl leading-relaxed">
            {t('run.useBody')} <span className="num text-bone">{recommended.scores.overall}</span>{t('run.useEstCost')} <span className="num text-bone">{fmtUSD(recommended.cost, 4)}</span>{t('run.useTrailer')}
          </p>
        </div>
        <div className="flex flex-col gap-2 min-w-[260px]">
          <a
            href={`#/providers/${recP.slug}`}
            className="btn-brand px-6 py-3 text-sm font-medium tracking-tight inline-flex items-center gap-2 justify-center"
          >
            {t('run.useHeadline')} {recP.name} <I.arrow className="w-4 h-4"/>
          </a>
          {!isSame(cheapP) && (
            <a
              href={`#/providers/${cheapP.slug}`}
              className="btn-ghost px-6 py-2 text-[12px] inline-flex items-center justify-between gap-3"
            >
              <span>{t('run.useCheapestPick', { name: cheapP.name })}</span>
              <span className="num text-brand">{fmtUSD(cheapest.cost, 4)}</span>
            </a>
          )}
          {!isSame(trustP) && (
            <a
              href={`#/providers/${trustP.slug}`}
              className="btn-ghost px-6 py-2 text-[12px] inline-flex items-center justify-between gap-3"
            >
              <span>{t('run.useTrustedPick', { name: trustP.name })}</span>
              <span className="num text-amber">{trustP.trust}</span>
            </a>
          )}
        </div>
      </div>
    </div>
  );
}

const VALIDATE_SAMPLES = [
  { label: 'Portkey', url: 'https://api.portkey.ai/v1/chat/completions' },
  { label: 'OpenRouter', url: 'https://openrouter.ai/api/v1/chat/completions' },
  { label: 'Together AI', url: 'https://api.together.xyz/v1/chat/completions' },
  { label: 'OpenAI direct', url: 'https://api.openai.com/v1/chat/completions' },
  { label: 'Custom router', url: 'https://your-router.example.com/v1/chat/completions' },
];

const VALIDATE_PHASES = [
  { key: 'probe',    label: 'Probing endpoint',     detail: 'TLS handshake · auth shape · response headers' },
  { key: 'sample',   label: 'Sampling probe set',   detail: 'Sending 50 fixed prompts across categories' },
  { key: 'embed',    label: 'Embedding distance',   detail: 'Cosine similarity vs canonical model output' },
  { key: 'length',   label: 'Length distribution',  detail: 'Two-sample K-S test on output token length' },
  { key: 'tok',      label: 'Tokenizer signature',  detail: 'Inferring BPE merges + leading-whitespace handling' },
  { key: 'prec',     label: 'Precision estimate',   detail: 'Numeric-task accuracy delta vs FP16 baseline' },
  { key: 'refusal',  label: 'Refusal alignment',    detail: 'Safety probe — refusal-rate delta' },
  { key: 'score',    label: 'Composite match score',detail: 'Weighted aggregate (0–100)' },
];

function ValidatePage() {
  const { t } = useLang();
  const [url, setUrl] = useState('');
  const [apiKey, setApiKey] = useState('');
  const [showKey, setShowKey] = useState(false);
  const [model, setModel] = useState('openai/gpt-5.5');
  const [phase, setPhase] = useState('idle'); // idle | running | complete
  const [phaseStatus, setPhaseStatus] = useState({}); // { key: 'pending'|'running'|'completed' }
  const [report, setReport] = useState(null);
  const [error, setError] = useState(null);

  const start = () => {
    if (!url.trim()) {
      setError(t('validate.errorPasteOrPick'));
      return;
    }
    try {
      new URL(url.match(/^https?:/) ? url : 'https://' + url);
    } catch {
      setError(t('validate.errorInvalidUrl'));
      return;
    }

    setError(null);
    setReport(null);
    const initStatus = {};
    VALIDATE_PHASES.forEach(p => { initStatus[p.key] = 'pending'; });
    setPhaseStatus(initStatus);
    setPhase('running');

    let cum = 200;
    const seed = strHash(url + model);
    const timers = [];
    VALIDATE_PHASES.forEach((p, i) => {
      const dur = 500 + ((seed + i * 37) % 700);
      const startAt = cum;
      const endAt = cum + dur;
      cum = endAt;
      timers.push(setTimeout(() => {
        setPhaseStatus(prev => ({ ...prev, [p.key]: 'running' }));
      }, startAt));
      timers.push(setTimeout(() => {
        setPhaseStatus(prev => ({ ...prev, [p.key]: 'completed' }));
      }, endAt));
    });

    timers.push(setTimeout(() => {
      const slug = inferProvider(url);
      const fp = slug ? fingerprint(slug, model) : syntheticFingerprint(url, model);
      let provider;
      if (slug) provider = PROVIDERS.find(p => p.slug === slug);
      else {
        let host = '';
        try { host = new URL(url.match(/^https?:/) ? url : 'https://' + url).hostname; } catch {}
        provider = { name: host || 'Unknown endpoint', type: 'first-seen', region: 'unknown' };
      }
      setReport({ slug, provider, fp, model });
      setPhase('complete');
    }, cum + 200));

    return () => timers.forEach(clearTimeout);
  };

  const reset = () => {
    setPhase('idle');
    setReport(null);
    setPhaseStatus({});
  };

  const m = MODELS.find(x => x.id === model);

  return (
    <div className="max-w-[1100px] mx-auto px-4 sm:px-6 lg:px-8 pt-12 pb-20">

      {/* Hero */}
      <div className="border-b border-ink-600 pb-8 mb-10">
        <div className="micro text-smoke">{t('validate.tool')}</div>
        <h1 className="serif text-4xl sm:text-5xl lg:text-6xl tracking-editorial mt-2">
          {t('validate.headPre')} <span className="serif-it text-brand">{t('validate.headIt')}</span>{t('validate.headPost')}
        </h1>
        <p className="text-ash mt-3 max-w-2xl text-[15px] leading-relaxed">
          {t('validate.subhead')}
        </p>
      </div>

      {/* Form */}
      <div className="grid lg:grid-cols-[1fr_auto] gap-6 mb-10 items-start">
        <div className="space-y-4">
          <div>
            <div className="micro text-smoke mb-2">{t('validate.endpointUrl')}</div>
            <input
              type="text"
              value={url}
              onChange={e => { setUrl(e.target.value); setError(null); }}
              onKeyDown={e => { if ((e.metaKey || e.ctrlKey) && e.key === 'Enter') start(); }}
              placeholder={t('validate.urlPlaceholder')}
              disabled={phase === 'running'}
              spellCheck={false}
              className="w-full bg-ink-800 border border-ink-500 focus:border-brand/60 outline-none px-4 py-3 text-[14px] text-bone num"
            />
          </div>

          <div>
            <div className="micro text-smoke mb-2 flex items-center justify-between">
              <span>{t('validate.apiKey')} <span className="text-smoke normal-case tracking-normal">{t('validate.apiKeyOptional')}</span></span>
              {apiKey && (

function phaseResultText(key, fp, t) {
  if (!fp) return null;
  switch (key) {
    case 'probe':   return '200 OK · TLS 1.3';
    case 'sample':  return t ? t('validate.probeOk', { n: fp.samples }) : `${fp.samples} prompts ok`;
    case 'embed':   return fp.embedDist != null ? fp.embedDist.toFixed(2) : null;
    case 'length':  return fp.lengthKsP != null ? `p=${fp.lengthKsP.toFixed(2)}` : null;
    case 'tok':     return fp.tokenizer ? (fp.tokenizer.match ? (t ? t('validate.tokMatch') : '✓ match') : (t ? t('validate.tokMismatch') : '✗ mismatch')) : null;
    case 'prec':    return fp.precision || null;
    case 'refusal': return fp.refusalDelta != null ? `${fp.refusalDelta > 0 ? '+' : ''}${fp.refusalDelta}pt` : null;
    case 'score':   return fp.score != null ? `${fp.score} / 100` : null;
    default: return null;
  }
}

function ValidateReport({ report }) {
  const { t } = useLang();
  const { provider, fp, slug } = report;
  if (!fp) return null;
  if (fp.unsupported) {
    return (
      <div className="card p-6 sm:p-8">
        <div className="flex items-start gap-5">
          <span className="serif-it text-6xl text-smoke leading-none">∅</span>
          <div className="flex-1">
            <div className="micro text-smoke mb-2">{t('validate.unsupportedTag')}</div>
            <h4 className="serif text-2xl tracking-editorial">{t('validate.unsupportedTitle', { name: provider.name })}</h4>
            <p className="mt-3 text-ash text-[13px] leading-relaxed max-w-2xl">{fp.reason}</p>
          </div>
        </div>
      </div>
    );
  }

  return (
    <div className="space-y-4">
      {fp.flag && (
        <div className="border border-coral/40 bg-coral/[0.04] px-4 py-3">
          <div className="flex items-start gap-3">
            <I.alert className="w-4 h-4 text-coral mt-0.5 shrink-0"/>
            <div className="flex-1">
              <div className="text-coral text-[13px] tracking-tight">{fp.flag.headline}</div>
              <p className="mt-1 text-[12px] text-ash leading-relaxed">{fp.flag.detail}</p>
            </div>
          </div>
        </div>
      )}

      <div className="card p-6 space-y-5">
        <div className="flex items-baseline justify-between flex-wrap gap-3">
          <div>
            <div className="micro text-smoke">{slug ? t('validate.indexedRouter') : t('validate.firstSeen')}</div>
            <div className="flex items-center gap-3 mt-2">
              {slug && <ProviderMark slug={slug}/>}
              <div>
                <div className="text-[15px] text-bone">{provider.name}</div>
                <div className="micro text-smoke">{provider.type}{slug ? ' · ' + t('validate.onTheBoard') : ' · ' + t('validate.singleProbe')}</div>
              </div>
            </div>
          </div>
          <div className="text-right">
            <div className="micro text-smoke">{t('validate.matchScore')}</div>
            <div className="flex items-baseline gap-2 mt-1">
              <span className={cx('serif text-5xl tracking-editorial',
                fp.score >= 88 ? 'text-brand' : fp.score >= 70 ? 'text-amber' : 'text-coral')}>
                {fp.score}
              </span>
              <span className="text-[12px] text-smoke num">/ 100</span>
            </div>
            <div className="text-[11px] mt-1">
              {fp.score >= 88 && <span className="text-brand">{t('validate.verified')}</span>}
              {fp.score >= 70 && fp.score < 88 && <span className="text-amber">{t('validate.caution')}</span>}
              {fp.score < 70 && <span className="text-coral">{t('validate.risky')}</span>}
              <span className="text-smoke"> · {t('validate.samplesShort', { n: fp.samples })}</span>
            </div>
          </div>
        </div>

        <div className="pt-4 border-t border-ink-600 space-y-4">
          <FpBar label={t('validate.fpEmbedDist')} value={fp.embedDist.toFixed(2)}
                 pct={fp.embedDist * 100} ok={fp.embedDist >= 0.85}
                 hint={t('validate.fpEmbedHint')}/>
          <FpBar label={t('validate.fpLengthDist')}
                 value={`K-S p=${fp.lengthKsP.toFixed(2)}`}
                 pct={Math.min(100, fp.lengthKsP * 200)} ok={fp.lengthKsP >= 0.20}
                 hint={t('validate.fpLengthHint')}/>
          <FpRow label={t('validate.fpTokenizer')} value={fp.tokenizer.observed}
                 ok={fp.tokenizer.match} expected={fp.tokenizer.expected}
                 expectedLabel={t('provider.fpExpected')}
                 hint={t('validate.fpTokenizerHint')}/>
          <FpRow label={t('validate.fpPrecision')} value={fp.precision} ok={fp.precision === 'FP16'}
                 expectedLabel={t('provider.fpExpected')}
                 hint={t('validate.fpPrecisionHint')}/>
          <FpRow label={t('validate.fpRefusal')}
                 value={`${fp.refusalDelta > 0 ? '+' : ''}${fp.refusalDelta}pt`}
                 ok={Math.abs(fp.refusalDelta) <= 3}
                 expectedLabel={t('provider.fpExpected')}
                 hint={t('validate.fpRefusalHint')}/>
        </div>

        {fp.firstSeen && (
          <div className="pt-4 border-t border-ink-600 text-[11px] text-smoke leading-relaxed flex items-start gap-2">
            <I.alert className="w-3.5 h-3.5 mt-0.5 shrink-0 text-amber"/>
            <span>{t('validate.firstSeenNote')}</span>
          </div>
        )}
        {slug && (
          <div className="pt-4 border-t border-ink-600 text-[11px] text-smoke leading-relaxed">
            {t('validate.indexedNote')} <a href={`#/providers/${slug}`} className="ulink text-brand">{t('validate.indexedLink')}</a>
          </div>
        )}
      </div>
    </div>
  );
}

      {/* Sampling protocol */}
      <DocSection num="04" title={t('docs.s04Title')}>

      {/* Reproducibility */}
      <DocSection num="05" title={t('docs.s05Title')}>
        <p>{t('docs.s05Intro')}</p>
        <ul className="mt-4 space-y-2 text-[13px]">
          <li>{t('docs.s05Item1')}</li>
          <li>{t('docs.s05Item2')}</li>
          <li>{t('docs.s05Item3')}</li>
          <li>{t('docs.s05Item4Pre')}<code className="num text-bone bg-ink-700 px-1.5 py-0.5">tiktoken</code>{t('docs.s05Item4Mid')}<code className="num text-bone bg-ink-700 px-1.5 py-0.5">o200k_base</code>{t('docs.s05Item4Post')}</li>

          { k: 'LLMRouterBench',  arxiv: '2601.07206', why: t('docs.s05Method1Why') },

      <DocSection num="07" title={t('docs.s07Title')}>
        <p>{t('docs.s07Intro')}</p>

function DocSection({ num, title, children }) {
  return (
    <section className="mt-16 pt-10 border-t border-ink-600">
      <div className="grid md:grid-cols-[100px_1fr] gap-4 md:gap-8">
        <div className="serif-it text-4xl sm:text-5xl text-smoke">{num}</div>
        <div>
          <h2 className="serif text-3xl sm:text-4xl tracking-editorial">{title}</h2>
          <div className="mt-4 text-ash text-[15px] leading-relaxed space-y-3">{children}</div>
        </div>
      </div>
    </section>
  );
}

function DimSection({ num, title, weight, question, children }) {
  const { t } = useLang();
  return (
    <section className="mt-16 pt-10 border-t border-ink-600">
      <div className="flex items-baseline justify-between flex-wrap gap-3">
        <div className="micro text-smoke">{num} · {title}</div>
        <span className="num text-[12px] text-brand">{t('docs.labelWeight')} {weight}</span>
      </div>
      <h2 className="serif text-3xl sm:text-4xl tracking-editorial mt-2">{title}</h2>
      <p className="serif-it text-bone text-xl mt-2">{question}</p>
      <div className="mt-6 text-ash text-[15px] leading-relaxed space-y-4">{children}</div>
    </section>
  );
}

function SubDim({ id, name, weight, children }) {
  const { t } = useLang();
  return (
    <div className="mt-6 pt-6 border-t border-ink-600">
      <div className="flex items-baseline justify-between flex-wrap gap-2 mb-3">
        <h3 className="serif text-2xl tracking-editorial">
          <span className="text-smoke">§{id}</span> {name}
        </h3>
        <span className="num text-[11px] text-smoke">{t('docs.labelWeightWithin', { w: weight })}</span>
      </div>
      <div className="text-ash text-[14px] leading-relaxed space-y-2">{children}</div>
    </div>
  );
}

function Methods({ items }) {
  return (
    <div className="mt-4 card-2">
      {items.map((it, i) => (
        <div key={i} className={cx('px-4 py-3 flex items-start gap-3 flex-wrap', i > 0 && 'border-t border-ink-600')}>
          <div className="flex-1 min-w-0">
            <div className="text-[13px] text-bone">{it.k}</div>
            <p className="text-[12px] text-ash mt-1 leading-relaxed">{it.why}</p>
          </div>
          {it.arxiv && (
            <a
              href={`https://arxiv.org/abs/${it.arxiv}`}
              target="_blank"
              rel="noopener noreferrer"
              className="micro text-smoke hover:text-brand whitespace-nowrap inline-flex items-center gap-1 transition-colors shrink-0"
            >
              arXiv:{it.arxiv} <I.external className="w-2.5 h-2.5"/>
            </a>
          )}
        </div>
      ))}
    </div>
  );
}

/* ===========================================================
   APP ROOT
   =========================================================== */

function App() {
  const { route } = useRouter();
  const path = route.path;

  let page;
  if (path === '/') page = <HomePage/>;
  else if (path === '/run' || path === '/compare' || path === '/playground') page = <RunPage/>;
  else if (path === '/validate') page = <ValidatePage/>;
  else if (path === '/docs') page = <DocsPage/>;
  else if (path.startsWith('/providers/')) {
    const slug = path.replace('/providers/', '');
    page = <ProviderPage slug={slug}/>;
  } else page = <HomePage/>;

  // scroll to top on route change
  useEffect(() => { window.scrollTo({ top: 0, behavior: 'instant' }); }, [path]);

  return (
    <div className="min-h-screen flex flex-col">
      <Header/>
      <main className="flex-1">
        {page}
      </main>
      <Footer/>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(
  <RouterProvider>
    <ThemeProvider>
      <LangProvider>
        <ToastProvider>
          <App/>
        </ToastProvider>
      </LangProvider>
    </ThemeProvider>
  </RouterProvider>
);
</script>
</body>
</html>
